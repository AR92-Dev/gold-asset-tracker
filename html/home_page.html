<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/asset.css">
     <link rel="stylesheet" href="../css/home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
    <title>Home</title>
</head>
<body>
    <div class="maindev">
        
        <header id="header-placeholder"></header>
        <div class="currenychange">Later</div>
        <div class="content">
            <div class="prices">
                <div class="news">
                    <div class="newscard">
                        <span class="badge">LATEST MARKET NEWS</span>
                        <div>
                            <h1>Central Banks Accelerate Gold Reserves Amidst Global Shifts</h1>
                        <div class="bottom-row">
                        <button class="read-more">
                        Read Article <span>&rarr;</span>
                        </button>
      
                        <div class="pagination">
                        <span class="line active"></span>
                        <span class="line"></span>
                        <span class="line"></span>
                        </div>
                        </div>
                        
                    </div>
                    </div>
                </div>
                <div class="sideprices">
                    <div class="liveprice">
                        <div class="livepricefirst">
                            <p>LIVE OUNCE PRICE</p>
                            <h4>$2,342.15</h4>
                        </div>
                        <div class="livepricesecond">
                            <i class="fa-solid fa-arrow-trend-up"></i>
                        </div>
                        

                    </div>
                    <div class="gramprice">
                        <div class="grampricefirst">
                            <div class="firstgram">
                                <div class="24K">
                            <p>24K GRAM PRICE</p>
                            <h4>$75.15</h4>
                            </div>
                            <div><i class="fa-solid fa-database"></i></div>
                            </div>
                            
                            <hr>
                            <div class="othergram">
                                <div class="21gram">
                                    <p>21K GRAM</p>
                                    <h4>$65.91</h4>
                                </div>
                                <div class="18gram">
                                    <p>18K GRAM</p>
                                    <h4>$56.49</h4>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="chart">
            <div class="charupper">
                <p>Gold Price Chart</p>
                <div class="intervalchart">
                    <button>1D</button>
                    <button>1W</button>
                    <button class="selected">1M</button>
                    <button>1Y</button>
                    <button>ALL</button>
                </div>
            </div>
            <div class="chardraw">
                <canvas id="myChart" style="width:100%;max-width:700px"></canvas>
            </div>
        </div>
         <footer id="footer-placeholder"></footer>
    </div>
    <script
src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js">
</script>
<script src="/gold-asset-tracker/js/Template/template.js"></script>
<script src="/gold-asset-tracker/js/chart.js"></script>
</body>
</html>
