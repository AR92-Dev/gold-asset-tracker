    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/asset.css">
    <link rel="stylesheet" href="/css/myAssets.css">



    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/ed655d5e63.js" crossorigin="anonymous">

    </script>

<body>
    <header id="header-placeholder"></header>
    <div class="myAssets">
        <!-- coooomeeent******************* -->

        <div class="assets_1">
            <h2> My Assets</h2>
            
        </div>


        <div class="assets_2">

            <div class="total_value_card">
                <h6>Total Assets Value</h6>
                <div id="total_value"> $142,850.42</div>
            </div>

            <div class="total_profit_card">
                <h6>Total Profits/Loss </h6>
                <div id="total_profit"> + $142,850.42</div>
            </div>

            <div class="gold_price_card">
                <h6>Current Ounce Price </h6>
                <div id="gold_price"> $4682.9</div>
            </div>
        </div>


        <div class="assets_3">
            <div class="searchBar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search ">
            </div>
            <div class="filter_group">
                <label for="typeSelect">Asset Type:</label>
                <select id="typeSelect" class="type_filter">
                    <option selected>All</option>
                    <option>Jewelry</option>
                    <option>Coins</option>
                    <option>Gold Bars</option>
                </select>
            </div>

            <div class="filter_group">
                <label for="kiratSelect">Kirat:</label>
                <select id="kiratSelect" class="kirat_filter">
                    <option selected>All</option>
                    <option>24k</option>
                    <option>21k</option>
                    <option>18k</option>
                </select>
            </div>

        </div>
         <!-- in data-bs-target="#addAssetModal" we put the id for the modal -->
        <div class="under_asset3" data-bs-toggle="modal" data-bs-target="#addAssetModal">
            <button><i class="fa-solid fa-plus"></i>
                <h6> Add New Asset</h6>
            </button>
        </div>
        <div class="assets_4">
            <div class="first_card">
                <img src="https://github.com/AR92-Dev/gold-asset-tracker/blob/main/images/Bracelet.png?raw=true">
                <div class="card_first_line">
                    <div class="tit_subTit">
                        <div> Bracelet</div>
                        <sub> Jewelry</sub>
                    </div>
                    <div id="card_kirat">18 k</div>
                </div>
                <div class="card_second_line">
                    <div class="data_info">
                        <sub> WEIGHT</sub>
                        <p> 120.50g</p>
                    </div>

                    <div class="data_info">
                        <sub> PURCHASE DATE</sub>
                        <p> Mar 04,2022</p>
                    </div>

                </div>
                <div class="card_third_line">
                    <div class="data_info">
                        <sub> PURCHASE PRICE</sub>
                        <p> $6,120.00</p>
                    </div>

                    <div class="data_info">
                        <sub> CURRENT VALUE</sub>
                        <p id="current_value">$6,845.50 </p>
                    </div>

                </div>
                <hr>
                <div class="card_bottom_line">
                    <div class="data_info">
                        <sub> PROFIT/LOSS</sub>
                        <p id="prof_value">+$725.50 </p>
                    </div>
                    <div id="percentage_value">+11.8%</div>
                </div>
            </div>
        </div>
    </div>
    <footer id="footer-placeholder"></footer>

    <!-- Add New Asset Modal -->
<div class="modal fade" id="addAssetModal" tabindex="-1" aria-labelledby="addAssetModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background-color: #1C1B1B; color: #E5E2E1;">
      <div class="modal-header">
        <h5 class="modal-title" id="addAssetModalLabel">Add New Asset</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addAssetForm">
          <div class="mb-3">
            <label for="assetName" class="form-label">Asset Name</label>
            <input type="text" class="form-control" id="assetName" placeholder="Enter asset name">
          </div>
             <div class="mb-3">
            <label for="kirat" class="form-label">Kirat</label>
            <select class="form-control" id="kirat">
              <option>24k</option>
              <option>21k</option>
              <option>18k</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="assetType" class="form-label">Asset Type</label>
            <select class="form-control" id="assetType">
              <option>Jewelry</option>
              <option>Coins</option>
              <option>Gold Bars</option>
            </select>
          </div>
           <div class="mb-3 typeJewlery">
            <label for="typeJewlery" class="form-label">Jewelry Type</label>
            <select class="form-control" id="typeJewlery">
              <option>Ring</option>
              <option>Bracelet</option>
              <option>Necklace</option>
              <option>Earrings</option>
            </select>
          </div>
           <div class="mb-3 typeCoins">
            <label for="typeCoins" class="form-label">Coin Type</label>
            <select class="form-control" id="typeCoins">
              <option>English Coin (8g)</option>
              <option>Rashadi Coin (7g)</option>
            </select>
          </div>
           <div class="mb-3 typeBars">
            <label for="typeBars" class="form-label">Bar Type</label>
            <select class="form-control" id="typeBars">
              <option>1 Bullion Bar (1Kg)</option>
              <option>1 Ounce (31.10 g)</option>
              <option>1/2 Ounce </option>
              <option>other</option>
            </select>
          </div>
       
          <div class="mb-3">
            <label for="weight" class="form-label">Weight (g)</label>
            <input type="number" class="form-control" id="weight" placeholder="Enter weight">
          </div>
          <div class="mb-3">
            <label for="purchasePrice" class="form-label">Purchase Price ($)</label>
            <input type="number" class="form-control" id="purchasePrice" placeholder="Enter purchase price">
          </div>
          <div class="mb-3">
            <label for="purchaseDate" class="form-label">Purchase Date</label>
            <input type="date" class="form-control" id="purchaseDate">
          </div>
          <div class="mb-3">
            <label for="assetImage" class="form-label">Asset Image </label>
            <input type="file" class="form-control" id="assetImage">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-warning" id="saveAssetBtn">Save Asset</button>
      </div>
    </div>
  </div>
</div>

    <script src="/js/Template/template.js"></script>
    <script src="/js/myAssetForm.js"></script>
</body>

</html>
