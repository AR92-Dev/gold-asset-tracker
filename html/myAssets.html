<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="myAssets.css">
    <link rel="stylesheet" href="asset.css">
    <script src="https://kit.fontawesome.com/ed655d5e63.js" crossorigin="anonymous"></script>

</head>

<body>
    <div class="myAssets">
<!-- coooomeeent******************* -->

        <div class="assets_1">
            <h2> My Assets</h2>
            <button><i class="fa-solid fa-plus"></i>
                <h6> Add New Asset</h6>
            </button>
        </div>


        <div class="assets_2">

            <div class="total_value_card">
                <h6>Total Assets Value</h6>
                <div id="total_value"> $142,850.42</div>
            </div>

            <div class="total_profit_card">
                <h6>Total Profits/Loss </h6>
                <div id="total_profit"> + $142,850.42</div>
            </div>

            <div class="gold_price_card">
                <h6>Current Ounce Price </h6>
                <div id="gold_price"> $4682.9</div>
            </div>
        </div>


        <div class="assets_3">
            <div class="searchBar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="serchInput" placeholder="Search ">
            </div>
            <select class="type_filter">
                <option>Jewelry</option>
                <option>Coins</option>
                <option>Gold Bars</option>
            </select>
            <select class="kirat_filter">
                <option>24k</option>
                <option>21k</option>
                <option>18k</option>
            </select>

        </div>
        <div class="assets_4">
            <div class="first_card">
                <img src="https://github.com/AR92-Dev/gold-asset-tracker/blob/main/images/Bracelet.png?raw=true">
                <div class="card_first_line">
                    <div class="tit_subTit">
                        <div> Bracelet</div>
                        <sub> Jewelry</sub>
                    </div>
                    <div>18 k</div>
                </div>
                <div class="card_second_line">
                    <div class="data_info">
                        <sub> WEIGHT</sub>
                        <p> 120.50g</p>
                    </div>

                    <div class="data_info">
                        <sub> PURCHASE DATE</sub>
                        <p> Mar 04,2022</p>
                    </div>
                    
                </div>
                 <div class="card_third_line">
                    <div class="data_info">
                        <sub> PURCHASE PRICE</sub>
                        <p> $6,120.00</p>
                    </div>

                    <div class="data_info">
                        <sub> CURRENT VALUE</sub>
                        <p>$6,845.50 </p>
                    </div>
                    
                </div>
                <hr>
                 <div class="card_bottom_line">
                    <div class="data_info">
                         <sub> PROFIT/LOSS</sub>
                        <p>+$725.50 </p>
                    </div>
                    <div>+11.8%</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
